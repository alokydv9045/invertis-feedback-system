<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mobile Feedback Submission Page</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Montserrat:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                            "secondary-container": "#fd8955",
                            "on-secondary-fixed-variant": "#7d2d00",
                            "tertiary-fixed-dim": "#b0c6ff",
                            "error": "#ba1a1a",
                            "secondary": "#9f4212",
                            "surface-container-low": "#f2f4f6",
                            "surface-container": "#eceef0",
                            "primary-container": "#266fe6",
                            "surface-variant": "#e0e3e5",
                            "surface": "#f7f9fb",
                            "on-primary-fixed-variant": "#004299",
                            "tertiary-container": "#336fe1",
                            "on-tertiary": "#ffffff",
                            "surface-tint": "#0059c7",
                            "error-container": "#ffdad6",
                            "on-secondary-container": "#6e2600",
                            "surface-container-high": "#e6e8ea",
                            "outline": "#727785",
                            "on-error": "#ffffff",
                            "tertiary": "#0155c6",
                            "on-secondary": "#ffffff",
                            "on-error-container": "#93000a",
                            "secondary-fixed-dim": "#ffb597",
                            "on-primary-fixed": "#001943",
                            "outline-variant": "#c2c6d6",
                            "secondary-fixed": "#ffdbcd",
                            "inverse-surface": "#2d3133",
                            "on-tertiary-fixed": "#001945",
                            "surface-container-highest": "#e0e3e5",
                            "tertiary-fixed": "#d9e2ff",
                            "primary": "#0057c2",
                            "background": "#f7f9fb",
                            "on-background": "#191c1e",
                            "surface-bright": "#f7f9fb",
                            "inverse-on-surface": "#eff1f3",
                            "on-primary": "#ffffff",
                            "on-tertiary-fixed-variant": "#00429c",
                            "inverse-primary": "#afc6ff",
                            "on-secondary-fixed": "#360f00",
                            "on-tertiary-container": "#fefcff",
                            "on-surface": "#191c1e",
                            "surface-dim": "#d8dadc",
                            "on-primary-container": "#fefcff",
                            "surface-container-lowest": "#ffffff",
                            "on-surface-variant": "#424754",
                            "primary-fixed": "#d9e2ff",
                            "primary-fixed-dim": "#afc6ff"
                    },
                    "borderRadius": {
                            "DEFAULT": "0.125rem",
                            "lg": "0.25rem",
                            "xl": "0.5rem",
                            "full": "0.75rem"
                    },
                    "spacing": {
                            "xs": "8px",
                            "margin-desktop": "48px",
                            "margin-mobile": "16px",
                            "md": "24px",
                            "sm": "16px",
                            "lg": "40px",
                            "xl": "64px",
                            "gutter": "24px",
                            "base": "4px"
                    },
                    "fontFamily": {
                            "headline-sm": ["Montserrat"],
                            "label-sm": ["Inter"],
                            "headline-md": ["Montserrat"],
                            "label-md": ["Inter"],
                            "body-lg": ["Inter"],
                            "headline-lg": ["Montserrat"],
                            "body-md": ["Inter"]
                    },
                    "fontSize": {
                            "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                            "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                            "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                            "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                            "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                            "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                            "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Custom styles to hide default radio buttons while keeping them accessible */
        .segmented-radio input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
        .segmented-radio input[type="radio"]:focus-visible + div {
            outline: 2px solid #0057c2; /* primary color */
            outline-offset: 2px;
        }
        /* Style for selected state */
        .segmented-radio input[type="radio"]:checked + div {
            background-color: rgba(38, 111, 230, 0.1); /* primary-container with opacity */
            border-color: #0057c2; /* primary */
            color: #0057c2; /* primary */
            font-weight: 600;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background antialiased pb-28 md:max-w-md md:mx-auto md:border-x md:border-surface-variant md:shadow-lg">
<!-- Task-Focused Header (Suppresses Global Nav due to Transactional Intent) -->
<header class="sticky top-0 z-40 bg-surface/95 backdrop-blur-md border-b border-surface-variant px-margin-mobile py-sm flex items-center justify-between shadow-sm">
<button aria-label="Close form" class="p-xs -ml-xs text-on-surface-variant hover:text-on-surface active:bg-surface-variant rounded-full transition-colors">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
<div class="text-center flex-1"><img alt="Invertis University Bareilly" class="h-8 mx-auto object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ujtZe0-qrM8ge2gwK3ZSfxpJt1OW4ZvAPuAda34nX5ysArT-TJAz-bg149vVk6DHTXe3EpYxqfVob2XKvjHrcbQdaLcNWR0QA1u2gkp_4rWm5d2KgH0aho48zzVjovYReVo-HhKkbMrtWvTe3o1h6_HjxzJJ5sthacZXKK1LedchJm-0bv7AdDGWnIiiPRCuPrNJNPZlG08mLM2bBD_bIHLI35_Ugexedo0lj0osvmMj08zq4rEqZC4AzzIVkG4Qlu0HKnfYE4rnw"/></div>
<!-- Placeholder to balance the header -->
<div class="w-10"></div>
</header>
<!-- Main Form Content -->
<main class="flex-1 px-margin-mobile py-md flex flex-col gap-md">
<!-- Context Card -->
<section class="bg-surface rounded-xl p-md shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-surface-container border-opacity-50">
<div class="flex items-center gap-sm">
<img alt="Instructor Avatar" class="w-12 h-12 rounded-full object-cover border-2 border-surface-variant" data-alt="A professional headshot of an approachable academic professor in his late 40s. He is wearing a smart casual blazer over a crisp white shirt, standing in a brightly lit, modern university corridor. The lighting is soft and flattering, creating a trustworthy and competent mood. The color palette emphasizes clean whites, professional grays, and a hint of academic blue in the background blur to match the institutional light-mode aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_gbUcscU3rDwFLJxuRrwToKSfkHDZaRzJ3U8BR4Bxii6Tr9AAIMHiWeO2K0drebYniZQ3BTipPzL41rT16yTbATnbUYJ8fBBIPJwTOR05j5dTascm_NxC6MHnpA0C1uDOttXJQFa74IvRa4yof7lP2wGIk_hqQ6igQatGGqPP1f1W_ORQLNWWle5VRoaCVOvn8A5DiqHrTNhhRCB4GUi51BMOFNwE-swlCGgMwKdBYeuwn3fle2HmsjE-UDdjx_oaxQka86FDSdNX"/>
<div>
<h2 class="font-headline-sm text-headline-sm text-on-surface leading-tight">Data Structures</h2>
<p class="font-label-md text-label-md text-on-surface-variant mt-1">CS-201 • Prof. Alan Turing</p>
</div>
</div>
<div class="mt-sm pt-sm border-t border-surface-variant flex items-center gap-xs text-primary">
<span class="material-symbols-outlined text-[18px]">info</span>
<span class="font-label-sm text-label-sm">Your feedback is strictly anonymous.</span>
</div>
</section>
<!-- Question 1: Rating Stars (Optimized for touch targets) -->
<section class="bg-surface rounded-xl p-md shadow-[0px_4px_20px_rgba(0,0,0,0.05)]">
<div class="mb-md">
<span class="inline-block bg-primary-container text-on-primary-container font-label-sm text-label-sm px-2 py-1 rounded-full mb-2">Q1</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">How clear were the concepts taught in this module?</h3>
</div>
<div class="flex justify-between items-center px-1">
<button aria-label="Rate 1 star" class="text-secondary-container transform hover:scale-110 active:scale-90 transition-transform p-1">
<span class="material-symbols-outlined text-[44px]" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button aria-label="Rate 2 stars" class="text-secondary-container transform hover:scale-110 active:scale-90 transition-transform p-1">
<span class="material-symbols-outlined text-[44px]" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button aria-label="Rate 3 stars" class="text-secondary-container transform hover:scale-110 active:scale-90 transition-transform p-1">
<span class="material-symbols-outlined text-[44px]" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button aria-label="Rate 4 stars" class="text-secondary-container transform hover:scale-110 active:scale-90 transition-transform p-1">
<span class="material-symbols-outlined text-[44px]" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button aria-label="Rate 5 stars" class="text-surface-variant transform hover:scale-110 active:scale-90 transition-transform p-1">
<span class="material-symbols-outlined text-[44px]">star</span>
</button>
</div>
<div class="flex justify-between mt-2 px-2 text-on-surface-variant font-label-sm text-label-sm">
<span>Poor</span>
<span>Excellent</span>
</div>
</section>
<!-- Question 2: Segmented Control (One-handed friendly alternatives to dropdowns) -->
<section class="bg-surface rounded-xl p-md shadow-[0px_4px_20px_rgba(0,0,0,0.05)]">
<div class="mb-md">
<span class="inline-block bg-primary-container text-on-primary-container font-label-sm text-label-sm px-2 py-1 rounded-full mb-2">Q2</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">How would you rate the pace of the course?</h3>
</div>
<div class="flex flex-col gap-sm">
<label class="segmented-radio cursor-pointer relative">
<input name="pace" type="radio" value="slow"/>
<div class="border border-outline-variant rounded-lg p-sm font-body-md text-body-md text-on-surface transition-all duration-200 flex justify-between items-center">
                        Too Slow
                        <span class="material-symbols-outlined text-outline-variant opacity-0">check_circle</span>
</div>
</label>
<label class="segmented-radio cursor-pointer relative">
<input checked="" name="pace" type="radio" value="right"/>
<!-- Simulated checked state styling applied directly via tailwind classes to match the CSS above for demonstration, normally handled by CSS pseudo-classes -->
<div class="border-2 border-primary bg-primary-container/10 rounded-lg p-sm font-body-md text-body-md text-primary font-semibold transition-all duration-200 flex justify-between items-center">
                        Just Right
                        <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</label>
<label class="segmented-radio cursor-pointer relative">
<input name="pace" type="radio" value="fast"/>
<div class="border border-outline-variant rounded-lg p-sm font-body-md text-body-md text-on-surface transition-all duration-200 flex justify-between items-center">
                        Too Fast
                        <span class="material-symbols-outlined text-outline-variant opacity-0">check_circle</span>
</div>
</label>
</div>
</section>
<!-- Question 3: Long Form Text Input -->
<section class="bg-surface rounded-xl p-md shadow-[0px_4px_20px_rgba(0,0,0,0.05)]">
<div class="mb-md flex justify-between items-end">
<div>
<span class="inline-block bg-surface-variant text-on-surface-variant font-label-sm text-label-sm px-2 py-1 rounded-full mb-2">Optional</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Additional Comments</h3>
</div>
</div>
<div class="relative">
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg p-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors resize-none" placeholder="What could be improved? (E.g., more practical examples...)" rows="4"></textarea>
<div class="absolute bottom-3 right-3 text-on-surface-variant font-label-sm text-label-sm">0/500</div>
</div>
</section>
</main>
<!-- Sticky Bottom Action Area (Optimized for One-Handed Use) -->
<div class="fixed bottom-0 left-0 w-full md:max-w-md md:left-1/2 md:-translate-x-1/2 bg-surface/90 backdrop-blur-md border-t border-surface-variant p-margin-mobile z-50 shadow-[0px_-4px_20px_rgba(0,0,0,0.05)] pb-safe-area-inset-bottom">
<button class="w-full bg-primary text-on-primary hover:bg-surface-tint active:bg-primary-fixed-dim font-headline-sm text-headline-sm py-md rounded-full shadow-md active:scale-[0.98] transition-all duration-200 flex justify-center items-center gap-sm">
<span>Submit Feedback</span>
<span class="material-symbols-outlined">send</span>
</button>
<p class="text-center font-label-sm text-label-sm text-on-surface-variant mt-xs">
            Powered by Invertis Portal
        </p>
</div>
<!-- Padding utility for safe area on newer mobile devices (conceptual, standard tailwind doesn't have it built-in without plugin, simulating spacing) -->
<style>
        .pb-safe-area-inset-bottom {
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
        }
    </style>
</body></html>
