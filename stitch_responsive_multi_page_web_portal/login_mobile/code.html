<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                        "on-tertiary-fixed": "#001945",

                        "primary": "#0057c2",

                    "spacing": {

                        "xl": "64px",

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- Main Content Area - Optimized for Mobile First -->
<main class="flex-grow flex flex-col justify-center px-margin-mobile py-lg w-full max-w-md mx-auto">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-xl">
<img alt="Invertis University Logo" class="h-24 w-auto object-contain mb-md rounded-lg shadow-sm" src="https://lh3.googleusercontent.com/aida/ADBb0ujtZe0-qrM8ge2gwK3ZSfxpJt1OW4ZvAPuAda34nX5ysArT-TJAz-bg149vVk6DHTXe3EpYxqfVob2XKvjHrcbQdaLcNWR0QA1u2gkp_4rWm5d2KgH0aho48zzVjovYReVo-HhKkbMrtWvTe3o1h6_HjxzJJ5sthacZXKK1LedchJm-0bv7AdDGWnIiiPRCuPrNJNPZlG08mLM2bBD_bIHLI35_Ugexedo0lj0osvmMj08zq4rEqZC4AzzIVkG4Qlu0HKnfYE4rnw"/>
<h1 class="font-headline-lg text-headline-lg text-primary text-center">Invertis Feedback</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-xs">Centralized Portal</p>
</div>
<!-- Login Form Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)] p-md">
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 transform -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-low border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors font-body-md text-body-md text-on-surface" id="email" name="email" placeholder="student@invertis.org" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 transform -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-low border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors font-body-md text-body-md text-on-surface" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-[-8px]">
<a class="font-label-sm text-label-sm text-primary hover:text-tertiary-container transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Login Button -->
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-sm rounded-lg hover:bg-tertiary-container hover:-translate-y-[1px] hover:shadow-[0px_4px_10px_rgba(0,0,0,0.1)] active:translate-y-0 active:shadow-none transition-all flex items-center justify-center gap-xs mt-sm min-h-[48px]" type="submit">
<span>Login</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</form>
</div>
<!-- Registration Link -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                New student? 
                <a class="font-label-md text-label-md text-primary font-bold hover:underline transition-all" href="#">Register here</a>
</p>
</div>
</main>
</body></html>
