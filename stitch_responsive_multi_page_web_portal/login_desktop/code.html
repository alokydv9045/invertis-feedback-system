<!-- Login Form -->
<form action="#" class="flex flex-col gap-sm" method="POST">
<!-- Email Input Group -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-on-surface-variant text-[20px] pointer-events-none">mail</span>
<input class="w-full pl-[40px] pr-sm py-3 rounded-DEFAULT border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="email" name="email" placeholder="Enter your university email" required="" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-on-surface-variant text-[20px] pointer-events-none">lock</span>
<input class="w-full pl-[40px] pr-sm py-3 rounded-DEFAULT border border-outline-variant bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
</div>
</div>

                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
