<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Student Registration - Invertis</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Montserrat:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#fd8955",
                        "on-secondary-fixed-variant": "#7d2d00",
                        "tertiary-fixed-dim": "#b0c6ff",
                        "error": "#ba1a1a",
                        "secondary": "#9f4212",
                        "surface-container-low": "#f2f4f6",
                        "surface-container": "#eceef0",
                        "primary-container": "#266fe6",
                        "surface-variant": "#e0e3e5",
                        "surface": "#f7f9fb",
                        "on-primary-fixed-variant": "#004299",
                        "tertiary-container": "#336fe1",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#0059c7",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#6e2600",
                        "surface-container-high": "#e6e8ea",
                        "outline": "#727785",
                        "on-error": "#ffffff",
                        "tertiary": "#0155c6",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#ffb597",
                        "on-primary-fixed": "#001943",
                        "outline-variant": "#c2c6d6",
                        "secondary-fixed": "#ffdbcd",
                        "inverse-surface": "#2d3133",
                        "on-tertiary-fixed": "#001945",
                        "surface-container-highest": "#e0e3e5",
                        "tertiary-fixed": "#d9e2ff",
                        "primary": "#0057c2",
                        "background": "#f7f9fb",
                        "on-background": "#191c1e",
                        "surface-bright": "#f7f9fb",
                        "inverse-on-surface": "#eff1f3",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#00429c",
                        "inverse-primary": "#afc6ff",
                        "on-secondary-fixed": "#360f00",
                        "on-tertiary-container": "#fefcff",
                        "on-surface": "#191c1e",
                        "surface-dim": "#d8dadc",
                        "on-primary-container": "#fefcff",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#424754",
                        "primary-fixed": "#d9e2ff",
                        "primary-fixed-dim": "#afc6ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xs": "8px",
                        "margin-desktop": "48px",
                        "margin-mobile": "16px",
                        "md": "24px",
                        "sm": "16px",
                        "lg": "40px",
                        "xl": "64px",
                        "gutter": "24px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Montserrat"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Montserrat"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Montserrat"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface-bright min-h-screen font-body-md text-on-surface antialiased flex flex-col items-center">
<main class="w-full max-w-md px-margin-mobile py-lg flex flex-col items-center">
<!-- Header Section -->
<header class="flex flex-col items-center w-full mb-md text-center">
<img alt="Invertis University Logo" class="h-16 w-auto mb-sm object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ujtZe0-qrM8ge2gwK3ZSfxpJt1OW4ZvAPuAda34nX5ysArT-TJAz-bg149vVk6DHTXe3EpYxqfVob2XKvjHrcbQdaLcNWR0QA1u2gkp_4rWm5d2KgH0aho48zzVjovYReVo-HhKkbMrtWvTe3o1h6_HjxzJJ5sthacZXKK1LedchJm-0bv7AdDGWnIiiPRCuPrNJNPZlG08mLM2bBD_bIHLI35_Ugexedo0lj0osvmMj08zq4rEqZC4AzzIVkG4Qlu0HKnfYE4rnw"/>
<h1 class="font-headline-md text-headline-md text-on-surface">Student Registration</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-base">Create your account to access the university portal.</p>
</header>
<!-- Registration Form Card -->
<div class="w-full bg-surface-container-lowest rounded-xl shadow-sm p-md border border-surface-container">
<form class="flex flex-col gap-sm">
<!-- Full Name -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">person</span>
<input class="w-full bg-surface pl-10 pr-sm py-[10px] rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/70" id="fullName" placeholder="e.g. John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="email">University Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">mail</span>
<input class="w-full bg-surface pl-10 pr-sm py-[10px] rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/70" id="email" placeholder="student@invertis.edu" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="password">Create Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size: 20px;">lock</span>
<input class="w-full bg-surface pl-10 pr-10 py-[10px] rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/70" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
</button>
</div>
</div>
<!-- Course & Year Group -->
<div class="flex flex-col sm:flex-row gap-sm mt-xs">
<!-- Course Selection -->
<div class="flex flex-col gap-base flex-1">
<label class="font-label-md text-label-md text-on-surface" for="course">Program/Course</label>
<div class="relative">
<select class="w-full bg-surface appearance-none px-sm py-[10px] rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface cursor-pointer" id="course">
<option disabled="" selected="" value="">Select Course</option>
<option value="btech">B.Tech</option>
<option value="mtech">M.Tech</option>
<option value="bba">BBA</option>
<option value="mba">MBA</option>
<option value="bca">BCA</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" style="font-size: 20px;">expand_more</span>
</div>
</div>
<!-- Year Selection -->
<div class="flex flex-col gap-base w-full sm:w-1/3">
<label class="font-label-md text-label-md text-on-surface" for="year">Year</label>
<div class="relative">
<select class="w-full bg-surface appearance-none px-sm py-[10px] rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface cursor-pointer" id="year">
<option disabled="" selected="" value="">Year</option>
<option value="1">1st Year</option>
<option value="2">2nd Year</option>
<option value="3">3rd Year</option>
<option value="4">4th Year</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" style="font-size: 20px;">expand_more</span>
</div>
</div>
</div>
<!-- ID Card Photo Upload -->
<div class="flex flex-col gap-base mt-xs">
<label class="font-label-md text-label-md text-on-surface">ID Card Photo</label>
<div class="relative w-full border-2 border-dashed border-outline-variant rounded-lg bg-surface-container-low hover:bg-surface-container transition-colors cursor-pointer group">
<input accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" id="idPhoto" type="file"/>
<div class="flex flex-col items-center justify-center py-md px-sm text-center">
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center mb-xs group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
</div>
<p class="font-label-md text-label-md text-primary">Tap to upload ID</p>
<p class="font-body-md text-[12px] leading-tight text-on-surface-variant mt-base">PNG, JPG or PDF (Max 5MB)</p>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary py-[12px] px-md rounded-full font-label-md text-label-md flex justify-center items-center gap-xs hover:bg-primary/90 hover:shadow-sm transition-all mt-md active:scale-[0.98]" type="submit">
                    Complete Registration
                    <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Link -->
<div class="mt-md text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="font-label-md text-label-md text-primary hover:underline ml-base" href="#">Sign in</a>
</p>
</div>
</main>
</body></html>
